name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  AZURE_STORAGE_CONNECTION_STRING: UseDevelopmentStorage=true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build full stack
        run: npm run build

      - name: Lint
        run: npm run lint

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Azurite
        run: |
          npx azurite --silent --location ./.azurite-ci --port 10000 --queuePort 10001 --tablePort 10002 >/tmp/azurite.log 2>&1 &
          for i in $(seq 1 120); do
            if (echo > /dev/tcp/127.0.0.1/10002) >/dev/null 2>&1; then
              echo 'Azurite ready'
              exit 0
            fi
            sleep 1
          done
          echo '::error::Azurite did not become ready'
          exit 1

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          AZURE_STORAGE_CONNECTION_STRING: UseDevelopmentStorage=true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
