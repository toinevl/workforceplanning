name: Build and Deploy to Azure App Service

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Prepare standalone deployment package
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

      - name: Deploy via blob storage (Run-From-Package)
        env:
          APP_NAME: ${{ secrets.AZURE_APP_NAME }}
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONN_STR: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          STORAGE_ACCOUNT=$(echo "$CONN_STR" | grep -oP '(?<=AccountName=)[^;]+')
          ACCOUNT_KEY=$(echo "$CONN_STR" | grep -oP '(?<=AccountKey=)[^;]+')

          cd .next/standalone
          zip -r ../../deploy.zip . -q
          cd ../..

          az storage container create \
            --name deployments \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$ACCOUNT_KEY" \
            --output none 2>/dev/null || true

          az storage blob upload \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$ACCOUNT_KEY" \
            --container-name deployments \
            --name deploy-latest.zip \
            --file deploy.zip \
            --overwrite \
            --output none

          EXPIRY=$(date -u -d "+10 years" +%Y-%m-%dT%H:%MZ)
          SAS=$(az storage blob generate-sas \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$ACCOUNT_KEY" \
            --container-name deployments \
            --name deploy-latest.zip \
            --permissions r \
            --expiry "$EXPIRY" \
            --https-only \
            -o tsv)

          BLOB_URL="https://${STORAGE_ACCOUNT}.blob.core.windows.net/deployments/deploy-latest.zip?${SAS}"

          az webapp config appsettings set \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --settings "WEBSITE_RUN_FROM_PACKAGE=$BLOB_URL" \
            --output none

          az webapp restart \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP"

      - name: Health check production
        env:
          APP_NAME: ${{ secrets.AZURE_APP_NAME }}
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          PROD_URL="https://$(az webapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$APP_NAME" \
            --query "defaultHostName" -o tsv)"

          echo "Health-checking $PROD_URL ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "$PROD_URL/" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production healthy (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, waiting..."
            sleep 10
          done
          echo "::error::Production health check failed after 12 attempts"
          exit 1
