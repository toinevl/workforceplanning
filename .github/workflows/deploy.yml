name: Build and Deploy to Azure App Service

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Prepare standalone deployment package
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

      - name: Deploy via zip publish (Run-From-Package)
        env:
          APP_NAME: ${{ secrets.AZURE_APP_NAME }}
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          cd .next/standalone
          zip -r ../../deploy.zip . -q
          cd ../..

          az webapp deploy \
            --resource-group "$RESOURCE_GROUP" \
            --name "$APP_NAME" \
            --type zip \
            --src-path deploy.zip \
            --output none

      - name: Health check production
        env:
          APP_NAME: ${{ secrets.AZURE_APP_NAME }}
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          PROD_URL="https://$(az webapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$APP_NAME" \
            --query "defaultHostName" -o tsv)"

          echo "Health-checking $PROD_URL ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "$PROD_URL/" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production healthy (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, waiting..."
            sleep 10
          done
          echo "::error::Production health check failed after 12 attempts"
          exit 1
